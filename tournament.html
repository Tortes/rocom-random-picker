<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>洛克对战系统</title>
    <style>
      :root {
        --page: #f4f7f5;
        --page-alt: #eef3f7;
        --panel: #ffffff;
        --ink: #223039;
        --muted: #6a7881;
        --line: #d8e2e3;
        --line-strong: #b9cacc;
        --green: #267865;
        --green-dark: #1f6a59;
        --coral: #c95642;
        --gold: #d69a22;
        --blue: #4a80c2;
        --shadow: 0 12px 30px rgba(34, 48, 57, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
        background: var(--page);
        color: var(--ink);
        font-family: "Inter", "PingFang SC", "Microsoft YaHei", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background: linear-gradient(180deg, var(--page) 0%, var(--page-alt) 50%, #f7f1eb 100%);
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.58;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .app-shell {
        width: min(1440px, calc(100% - 32px));
        margin: 0 auto;
        padding: 28px 0 40px;
      }

      .topbar {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 20px;
        padding: 6px 0 18px;
        border-bottom: 1px solid var(--line);
      }

      .eyebrow {
        margin: 0 0 8px;
        color: var(--green);
        font-size: 13px;
        font-weight: 800;
      }

      h1,
      h2,
      h3 {
        margin: 0;
        line-height: 1.2;
      }

      h1 {
        font-size: 28px;
      }

      h2 {
        font-size: 20px;
      }

      h3 {
        font-size: 16px;
      }

      .actions,
      .inline-actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .actions {
        justify-content: flex-end;
      }

      .group-count-control {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
        white-space: nowrap;
      }

      .group-count-control .number-input {
        width: 64px;
      }

      .button,
      .link-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        min-height: 40px;
        padding: 0 13px;
        border-radius: 8px;
        white-space: nowrap;
      }

      .button svg,
      .link-button svg {
        width: 18px;
        height: 18px;
        flex: 0 0 auto;
      }

      .button.primary {
        border: 1px solid var(--green-dark);
        background: var(--green);
        color: #fff;
        font-weight: 800;
        box-shadow: 0 10px 18px rgba(38, 120, 101, 0.22);
      }

      .button.primary:hover {
        background: var(--green-dark);
      }

      .button.secondary,
      .link-button {
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.72);
        color: var(--muted);
        font-weight: 700;
      }

      .button.secondary:hover,
      .link-button:hover {
        border-color: var(--line-strong);
        color: var(--ink);
      }

      .button.danger {
        border: 1px solid rgba(201, 86, 66, 0.36);
        background: rgba(201, 86, 66, 0.08);
        color: #9b3c2f;
        font-weight: 800;
      }

      .button.small {
        min-height: 32px;
        padding: 0 10px;
        font-size: 13px;
      }

      .status-strip {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        margin: 18px 0 16px;
      }

      .tags {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .tag {
        display: inline-flex;
        align-items: center;
        min-height: 30px;
        padding: 0 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.72);
        color: #43515a;
        font-size: 13px;
        font-weight: 800;
      }

      .save-state {
        color: var(--muted);
        font-size: 14px;
        white-space: nowrap;
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(360px, 440px) minmax(0, 1fr);
        gap: 16px;
        align-items: start;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: var(--shadow);
      }

      .panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
      }

      .panel-body {
        padding: 14px 16px 16px;
      }

      .form-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
        margin-bottom: 12px;
      }

      .field,
      .select-field {
        width: 100%;
        min-height: 40px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--ink);
        padding: 0 11px;
        outline: none;
      }

      .field:focus,
      .select-field:focus {
        border-color: var(--green);
        box-shadow: 0 0 0 3px rgba(38, 120, 101, 0.12);
      }

      .help-text {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .player-list {
        display: grid;
        gap: 10px;
        margin-top: 12px;
      }

      .player-card {
        display: grid;
        gap: 10px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
      }

      .player-head {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto auto;
        gap: 10px;
        align-items: center;
      }

      .qualification-toggle {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
        white-space: nowrap;
      }

      .qualification-toggle input {
        width: 16px;
        height: 16px;
        margin: 0;
        accent-color: var(--green);
      }

      .player-card.verified {
        border-color: rgba(38, 120, 101, 0.42);
      }

      .manual-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
      }

      .roster-mini {
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        gap: 6px;
      }

      .pet-slot {
        min-height: 62px;
        display: grid;
        place-items: center;
        border: 1px dashed var(--line-strong);
        border-radius: 8px;
        background: rgba(244, 247, 245, 0.8);
        overflow: hidden;
      }

      .pet-slot.filled {
        border-style: solid;
        background: #fff;
      }

      .pet-slot.custom {
        background: #fff8ec;
        border-color: rgba(214, 154, 34, 0.42);
      }

      .pet-slot img {
        width: 48px;
        height: 48px;
        object-fit: contain;
        filter: drop-shadow(0 4px 5px rgba(34, 48, 57, 0.14));
      }

      .pet-slot span {
        color: var(--muted);
        font-size: 11px;
        font-weight: 800;
        max-width: 100%;
        overflow-wrap: anywhere;
        text-align: center;
      }

      .player-tools {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .main-flow {
        display: grid;
        gap: 16px;
      }

      .group-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .group-card {
        display: grid;
        gap: 14px;
      }

      .standings {
        width: 100%;
        border-collapse: collapse;
      }

      .standings th,
      .standings td {
        border-bottom: 1px solid rgba(34, 48, 57, 0.08);
        padding: 10px 8px;
        text-align: left;
        vertical-align: top;
      }

      .standings th {
        color: var(--muted);
        font-size: 12px;
        font-weight: 900;
      }

      .standing-player {
        min-width: 180px;
      }

      .player-name-line {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 7px;
        font-weight: 900;
      }

      .rank-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 26px;
        height: 22px;
        border-radius: 7px;
        background: rgba(34, 48, 57, 0.07);
        color: var(--muted);
        font-size: 12px;
        font-weight: 900;
      }

      .rank-pill.top {
        background: rgba(214, 154, 34, 0.18);
        color: #9f6d10;
      }

      .number-input {
        width: 82px;
        min-height: 36px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--ink);
        padding: 0 8px;
      }

      .match-list {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .match-chip {
        min-height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 8px 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.8);
        color: #43515a;
        font-size: 13px;
        font-weight: 800;
        text-align: center;
      }

      .bracket-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
      }

      .match-card {
        display: grid;
        gap: 12px;
        min-height: 180px;
        padding: 13px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
      }

      .match-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 900;
      }

      .versus {
        display: grid;
        gap: 8px;
      }

      .versus-player {
        display: grid;
        gap: 6px;
        padding: 9px;
        border: 1px solid rgba(34, 48, 57, 0.08);
        border-radius: 8px;
        background: rgba(244, 247, 245, 0.78);
      }

      .versus-player strong {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .result-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
      }

      .result-card {
        min-height: 82px;
        display: grid;
        gap: 5px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
      }

      .result-card span {
        color: var(--muted);
        font-size: 12px;
        font-weight: 900;
      }

      .result-card strong {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 16px;
      }

      .empty-state {
        min-height: 120px;
        display: grid;
        place-items: center;
        border: 1px dashed var(--line-strong);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.58);
        color: var(--muted);
        text-align: center;
        padding: 18px;
      }

      .compact-roster {
        grid-template-columns: repeat(6, 34px);
        justify-content: start;
        gap: 4px;
      }

      .compact-roster .pet-slot {
        min-height: 34px;
        border-radius: 7px;
      }

      .compact-roster .pet-slot img {
        width: 30px;
        height: 30px;
      }

      @media (max-width: 1180px) {
        .workspace {
          grid-template-columns: 1fr;
        }

        .group-grid,
        .bracket-grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 760px) {
        .app-shell {
          width: min(100% - 20px, 680px);
          padding-top: 18px;
        }

        .topbar,
        .status-strip,
        .panel-head {
          align-items: flex-start;
          flex-direction: column;
        }

        .actions,
        .button,
        .link-button {
          width: 100%;
        }

        .form-row,
        .player-head,
        .manual-row {
          grid-template-columns: 1fr;
        }

        .save-state {
          white-space: normal;
        }

        .match-list,
        .result-grid {
          grid-template-columns: 1fr;
        }

        .standings {
          min-width: 620px;
        }

        .table-scroll {
          overflow-x: auto;
          -webkit-overflow-scrolling: touch;
        }
      }
    </style>
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">洛克王国手游</p>
          <h1>对战赛事系统</h1>
        </div>
        <div class="actions">
          <a class="link-button" href="./index.html">
            <svg aria-hidden="true" viewBox="0 0 24 24" fill="none">
              <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
            随机抽选页
          </a>
          <button class="button danger" id="resetAllButton" type="button">
            <svg aria-hidden="true" viewBox="0 0 24 24" fill="none">
              <path d="M3 6h18M8 6V4h8v2M6 6l1 15h10l1-15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
            清空赛事
          </button>
          <button class="button secondary" id="exportConfigButton" type="button">导出配置</button>
          <button class="button secondary" id="importConfigButton" type="button">导入配置</button>
          <input id="importConfigInput" type="file" accept="application/json,.json" hidden>
        </div>
      </header>

      <section class="status-strip">
        <div class="tags">
          <span class="tag">参赛人员本地保存</span>
          <span class="tag">随机 6 只 / 手动不限</span>
          <span class="tag" id="groupCountTag">2 组循环赛</span>
          <span class="tag">半决赛 / 决赛 / 季军赛</span>
        </div>
        <div class="save-state" id="saveState">正在加载精灵数据</div>
      </section>

      <div class="workspace">
        <section class="panel" aria-label="参赛人员">
          <div class="panel-head">
            <h2>参赛人员</h2>
            <div class="inline-actions">
              <button class="button secondary small" id="rollAllButton" type="button">全部随机</button>
              <button class="button secondary small" id="verifyAllButton" type="button">一键全选</button>
              <button class="button secondary small" id="clearVerificationButton" type="button">一键全取消</button>
            </div>
          </div>
          <div class="panel-body">
            <div class="form-row">
              <input class="field" id="newPlayerName" type="text" maxlength="24" placeholder="输入玩家名">
              <button class="button primary" id="addPlayerButton" type="button">添加</button>
            </div>
            <div class="help-text">手动填入支持任意编号或名称，使用空格、逗号、顿号分隔。仅已验证资格的选手会进入赛程。</div>
            <div class="player-list" id="playerList"></div>
          </div>
        </section>

        <div class="main-flow">
          <section class="panel" aria-label="小组赛">
            <div class="panel-head">
              <h2>小组赛</h2>
              <div class="inline-actions">
                <label class="group-count-control" for="groupCountInput">分组数
                  <input class="number-input" id="groupCountInput" type="number" min="2" max="26" step="1" inputmode="numeric">
                </label>
                <button class="button secondary" id="createGroupsButton" type="button">划分小组</button>
                <button class="button primary" id="enterKnockoutButton" type="button">进入淘汰赛</button>
              </div>
            </div>
            <div class="panel-body" id="groupStage"></div>
          </section>

        </div>
      </div>
    </main>

    <script src="./dex-data.js"></script>
    <script>
      const STORAGE_KEY = "rocom-battle-system-state";
      const PET_COUNT = 6;
      const MIN_GROUP_COUNT = 2;
      const MAX_GROUP_COUNT = 26;

      const state = loadState();
      let pets = [];
      let dexPets = [];
      let petByNo = new Map();
      let petByName = new Map();

      const saveStateEl = document.querySelector("#saveState");
      const playerList = document.querySelector("#playerList");
      const groupStage = document.querySelector("#groupStage");
      const newPlayerName = document.querySelector("#newPlayerName");
      const addPlayerButton = document.querySelector("#addPlayerButton");
      const rollAllButton = document.querySelector("#rollAllButton");
      const verifyAllButton = document.querySelector("#verifyAllButton");
      const clearVerificationButton = document.querySelector("#clearVerificationButton");
      const createGroupsButton = document.querySelector("#createGroupsButton");
      const enterKnockoutButton = document.querySelector("#enterKnockoutButton");
      const resetAllButton = document.querySelector("#resetAllButton");
      const groupCountInput = document.querySelector("#groupCountInput");
      const groupCountTag = document.querySelector("#groupCountTag");
      const exportConfigButton = document.querySelector("#exportConfigButton");
      const importConfigButton = document.querySelector("#importConfigButton");
      const importConfigInput = document.querySelector("#importConfigInput");

      init();

      async function init() {
        wireEvents();
        try {
          pets = await loadPets();
          dexPets = loadDexPets(pets);
          petByNo = createPetNoMap(dexPets);
          petByName = createPetNameMap(dexPets);
          normalizeState();
          setStatus(`已加载 ${pets.length} 只候选精灵，${dexPets.length} 条图鉴头像，数据自动保存在本地`);
          renderAll();
        } catch (error) {
          setStatus(`精灵数据加载失败：${error.message}`);
          renderAll();
        }
      }

      function wireEvents() {
        addPlayerButton.addEventListener("click", addPlayer);
        newPlayerName.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            addPlayer();
          }
        });
        rollAllButton.addEventListener("click", () => {
          state.participants.forEach((participant) => {
            participant.team = rollPetNos();
          });
          saveAndRender();
        });
        createGroupsButton.addEventListener("click", createGroups);
        enterKnockoutButton.addEventListener("click", enterKnockout);
        verifyAllButton.addEventListener("click", () => setAllQualifications(true));
        clearVerificationButton.addEventListener("click", () => setAllQualifications(false));
        groupCountInput.addEventListener("change", updateGroupCount);
        exportConfigButton.addEventListener("click", exportConfig);
        importConfigButton.addEventListener("click", () => importConfigInput.click());
        importConfigInput.addEventListener("change", importConfig);
        resetAllButton.addEventListener("click", () => {
          if (!confirm("确认清空所有参赛人员、分组和比赛结果？")) {
            return;
          }
          state.participants = [];
          state.groups = null;
          state.groupStats = {};
          state.bracket = null;
          saveAndRender();
        });
      }

      async function loadPets() {
        const response = await fetch("./index.html", { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        const html = await response.text();
        const match = html.match(/const FALLBACK_PETS = (\[[\s\S]*?\]);\n\n      const TYPE_COLORS/);
        if (!match) {
          throw new Error("未找到候选池");
        }
        const parsed = JSON.parse(match[1]);
        if (!Array.isArray(parsed) || parsed.length < PET_COUNT) {
          throw new Error("候选池数量不足");
        }
        return parsed;
      }

      function loadDexPets(candidatePets) {
        if (Array.isArray(window.ROCOM_FULL_DEX) && window.ROCOM_FULL_DEX.length) {
          return window.ROCOM_FULL_DEX;
        }
        return candidatePets;
      }

      function loadState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) {
            return defaultState();
          }
          const parsed = JSON.parse(raw);
          return createState(parsed);
        } catch {
          return defaultState();
        }
      }

      function defaultState() {
        return {
          participants: [],
          groupCount: MIN_GROUP_COUNT,
          groups: null,
          groupStats: {},
          bracket: null
        };
      }

      function createState(value) {
        return {
          participants: Array.isArray(value?.participants) ? value.participants : [],
          groupCount: normalizeGroupCount(value?.groupCount),
          groups: value?.groups || null,
          groupStats: value?.groupStats || {},
          bracket: value?.bracket || null
        };
      }

      function normalizeState() {
        state.participants = state.participants
          .filter((participant) => participant && participant.id)
          .map((participant) => ({
            id: participant.id,
            name: cleanName(participant.name) || "未命名玩家",
            team: normalizeTeam(participant.team),
            eligible: Boolean(participant.eligible)
          }));
        const ids = new Set(state.participants.map((participant) => participant.id));
        const eligibleIds = new Set(state.participants.filter((participant) => participant.eligible).map((participant) => participant.id));
        state.groupCount = normalizeGroupCount(state.groupCount);
        if (state.groups) {
          const groupNames = getGroupNames();
          state.groups = Object.fromEntries(
            groupNames.map((groupName) => [(groupName), (state.groups[groupName] || []).filter((id) => ids.has(id) && eligibleIds.has(id))])
          );
        }
        if (!isPowerOfTwo(state.groupCount)) {
          state.bracket = null;
        } else if (state.bracket && !Array.isArray(state.bracket.rounds)) {
          state.bracket = migrateLegacyBracket(state.bracket);
        } else if (state.bracket && state.bracket.groupCount !== state.groupCount) {
          state.bracket = null;
        }
        Object.keys(state.groupStats || {}).forEach((id) => {
          if (!ids.has(id) || !eligibleIds.has(id)) {
            delete state.groupStats[id];
          }
        });
        if (state.bracket && !hasQualifiedGroups()) {
          state.bracket = null;
        }
      }

      function saveState() {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
          setStatus("已保存到本地");
        } catch (error) {
          setStatus("本地保存不可用");
        }
      }

      function saveAndRender() {
        normalizeState();
        saveState();
        renderAll();
      }

      function setStatus(message) {
        saveStateEl.textContent = message;
      }

      function renderAll() {
        renderParticipants();
        renderGroupStage();
        groupCountInput.value = state.groupCount;
        groupCountTag.textContent = `${state.groupCount} 组循环赛`;
        createGroupsButton.textContent = `划分 ${state.groupCount} 组`;
        createGroupsButton.disabled = getEligibleParticipants().length < state.groupCount * 2 || pets.length < PET_COUNT;
        enterKnockoutButton.disabled = !canEnterKnockout();
        enterKnockoutButton.title = isPowerOfTwo(state.groupCount)
          ? "每组至少需要 2 名已验证资格的选手"
          : "分组数量必须是 2、4、8 或 16 才能进入淘汰赛";
        rollAllButton.disabled = state.participants.length === 0 || pets.length < PET_COUNT;
        verifyAllButton.disabled = state.participants.length === 0 || state.participants.every((participant) => participant.eligible);
        clearVerificationButton.disabled = state.participants.length === 0 || state.participants.every((participant) => !participant.eligible);
      }

      function updateGroupCount() {
        const nextGroupCount = normalizeGroupCount(groupCountInput.value);
        groupCountInput.value = nextGroupCount;
        if (nextGroupCount === state.groupCount) {
          return;
        }
        state.groupCount = nextGroupCount;
        resetProgressAfterParticipantChange();
        saveAndRender();
      }

      function addPlayer() {
        const name = cleanName(newPlayerName.value);
        if (!name) {
          setStatus("请输入玩家名");
          return;
        }
        state.participants.push({
          id: createId(),
          name,
          team: [],
          eligible: false
        });
        newPlayerName.value = "";
        resetProgressAfterParticipantChange();
        saveAndRender();
      }

      function removePlayer(id) {
        state.participants = state.participants.filter((participant) => participant.id !== id);
        resetProgressAfterParticipantChange();
        saveAndRender();
      }

      function resetProgressAfterParticipantChange() {
        state.groups = null;
        state.groupStats = {};
        state.bracket = null;
      }

      function setAllQualifications(eligible) {
        if (state.participants.length === 0 || state.participants.every((participant) => participant.eligible === eligible)) {
          return;
        }
        state.participants.forEach((participant) => {
          participant.eligible = eligible;
        });
        resetProgressAfterParticipantChange();
        saveAndRender();
      }

      function renderParticipants() {
        if (state.participants.length === 0) {
          const empty = document.createElement("div");
          empty.className = "empty-state";
          empty.textContent = "先添加参赛人员";
          playerList.replaceChildren(empty);
          return;
        }
        playerList.replaceChildren(...state.participants.map(renderParticipantCard));
      }

      function renderParticipantCard(participant) {
        const card = document.createElement("article");
        card.className = participant.eligible ? "player-card verified" : "player-card";

        const head = document.createElement("div");
        head.className = "player-head";
        const nameInput = document.createElement("input");
        nameInput.className = "field";
        nameInput.maxLength = 24;
        nameInput.value = participant.name;
        nameInput.addEventListener("change", () => {
          participant.name = cleanName(nameInput.value) || participant.name;
          nameInput.value = participant.name;
          saveAndRender();
        });
        const qualification = document.createElement("label");
        qualification.className = "qualification-toggle";
        const qualificationInput = document.createElement("input");
        qualificationInput.type = "checkbox";
        qualificationInput.checked = participant.eligible;
        qualificationInput.addEventListener("change", () => {
          participant.eligible = qualificationInput.checked;
          resetProgressAfterParticipantChange();
          saveAndRender();
        });
        const qualificationText = document.createElement("span");
        qualificationText.textContent = "资格已验证";
        qualification.append(qualificationInput, qualificationText);
        const remove = document.createElement("button");
        remove.className = "button danger small";
        remove.type = "button";
        remove.textContent = "移除";
        remove.addEventListener("click", () => removePlayer(participant.id));
        head.append(nameInput, qualification, remove);

        const roster = renderRoster(participant.team, false);

        const tools = document.createElement("div");
        tools.className = "player-tools";
        const roll = document.createElement("button");
        roll.className = "button primary small";
        roll.type = "button";
        roll.textContent = "随机 6 只";
        roll.disabled = pets.length < PET_COUNT;
        roll.addEventListener("click", () => {
          participant.team = rollPetNos();
          saveAndRender();
        });
        const clear = document.createElement("button");
        clear.className = "button secondary small";
        clear.type = "button";
        clear.textContent = "清空精灵";
        clear.addEventListener("click", () => {
          participant.team = [];
          saveAndRender();
        });
        tools.append(roll, clear);

        const manual = document.createElement("div");
        manual.className = "manual-row";
        const manualInput = document.createElement("input");
        manualInput.className = "field";
        manualInput.placeholder = "手动输入任意编号";
        manualInput.value = participant.team.join(" ");
        const apply = document.createElement("button");
        apply.className = "button secondary";
        apply.type = "button";
        apply.textContent = "应用编号";
        apply.addEventListener("click", () => {
          const result = parseTeamInput(manualInput.value);
          participant.team = result.nos;
          saveAndRender();
        });
        manual.append(manualInput, apply);

        card.append(head, roster, tools, manual);
        return card;
      }

      function renderRoster(team, compact) {
        const roster = document.createElement("div");
        roster.className = compact ? "roster-mini compact-roster" : "roster-mini";
        const entries = normalizeTeam(team);
        const slotCount = Math.max(PET_COUNT, entries.length);
        for (let index = 0; index < slotCount; index += 1) {
          const slot = document.createElement("div");
          const entry = entries[index];
          const pet = resolvePet(entry);
          slot.className = pet ? "pet-slot filled" : entry ? "pet-slot filled custom" : "pet-slot";
          if (pet) {
            const img = document.createElement("img");
            img.src = pet.image;
            img.alt = pet.displayName;
            img.title = `NO.${pet.no} ${pet.displayName}`;
            img.loading = "lazy";
            img.decoding = "async";
            slot.append(img);
          } else if (entry) {
            const label = document.createElement("span");
            label.textContent = formatManualPetLabel(entry);
            label.title = entry;
            slot.append(label);
          } else {
            const label = document.createElement("span");
            label.textContent = index + 1;
            slot.append(label);
          }
          roster.append(slot);
        }
        return roster;
      }

      function createGroups() {
        const minimumParticipants = state.groupCount * 2;
        const eligibleParticipants = getEligibleParticipants();
        if (eligibleParticipants.length < minimumParticipants) {
          setStatus(`划分 ${state.groupCount} 组至少需要 ${minimumParticipants} 名已验证参赛资格的选手`);
          return;
        }
        const ids = shuffle(eligibleParticipants.map((participant) => participant.id));
        const groupNames = getGroupNames();
        state.groups = Object.fromEntries(groupNames.map((groupName) => [groupName, []]));
        ids.forEach((id, index) => {
          state.groups[groupNames[index % groupNames.length]].push(id);
        });
        state.groupStats = {};
        state.participants.forEach((participant) => {
          state.groupStats[participant.id] = { wins: 0, remaining: 0 };
        });
        state.bracket = null;
        saveAndRender();
      }

      function renderGroupStage() {
        if (!state.groups) {
          const empty = document.createElement("div");
          empty.className = "empty-state";
          empty.textContent = `验证至少 ${state.groupCount * 2} 名选手资格后，点击划分 ${state.groupCount} 组`;
          groupStage.replaceChildren(empty);
          return;
        }
        const grid = document.createElement("div");
        grid.className = "group-grid";
        getGroupNames().forEach((groupName) => grid.append(renderGroup(groupName)));
        groupStage.replaceChildren(grid);
      }

      function renderGroup(groupName) {
        const ids = state.groups[groupName] || [];
        const panel = document.createElement("section");
        panel.className = "group-card";

        const title = document.createElement("h3");
        title.textContent = `${groupName} 组`;

        const tableWrap = document.createElement("div");
        tableWrap.className = "table-scroll";
        const table = document.createElement("table");
        table.className = "standings";
        const thead = document.createElement("thead");
        thead.innerHTML = "<tr><th>排名</th><th>玩家</th><th>胜场</th><th>存活精灵</th></tr>";
        const tbody = document.createElement("tbody");
        rankGroup(groupName).forEach((entry, index) => tbody.append(renderStandingRow(entry, index)));
        table.append(thead, tbody);
        tableWrap.append(table);

        const matchTitle = document.createElement("h3");
        matchTitle.textContent = "循环赛对阵";
        const matchList = document.createElement("div");
        matchList.className = "match-list";
        const pairs = createRoundRobinPairs(ids);
        if (pairs.length === 0) {
          const empty = document.createElement("div");
          empty.className = "empty-state";
          empty.textContent = "本组人数不足";
          matchList.append(empty);
        } else {
          pairs.forEach(([left, right]) => {
            const chip = document.createElement("div");
            chip.className = "match-chip";
            chip.textContent = `${getPlayer(left)?.name || "未知"} vs ${getPlayer(right)?.name || "未知"}`;
            matchList.append(chip);
          });
        }

        panel.append(title, tableWrap, matchTitle, matchList);
        return panel;
      }

      function renderStandingRow(entry, index) {
        const row = document.createElement("tr");

        const rankCell = document.createElement("td");
        const rank = document.createElement("span");
        rank.className = index < 2 ? "rank-pill top" : "rank-pill";
        rank.textContent = index + 1;
        rankCell.append(rank);

        const playerCell = document.createElement("td");
        playerCell.className = "standing-player";
        const line = document.createElement("div");
        line.className = "player-name-line";
        line.textContent = entry.player.name;
        playerCell.append(line, renderRoster(entry.player.team, true));

        const winsCell = document.createElement("td");
        const wins = document.createElement("input");
        wins.className = "number-input";
        wins.type = "number";
        wins.min = "0";
        wins.step = "1";
        wins.value = entry.stats.wins;
        wins.addEventListener("change", () => {
          setGroupStat(entry.player.id, "wins", wins.value);
          saveAndRender();
        });
        winsCell.append(wins);

        const remainingCell = document.createElement("td");
        const remaining = document.createElement("input");
        remaining.className = "number-input";
        remaining.type = "number";
        remaining.min = "0";
        remaining.step = "1";
        remaining.value = entry.stats.remaining;
        remaining.addEventListener("change", () => {
          setGroupStat(entry.player.id, "remaining", remaining.value);
          saveAndRender();
        });
        remainingCell.append(remaining);

        row.append(rankCell, playerCell, winsCell, remainingCell);
        return row;
      }

      function setGroupStat(id, field, value) {
        if (!state.groupStats[id]) {
          state.groupStats[id] = { wins: 0, remaining: 0 };
        }
        state.groupStats[id][field] = Math.max(0, Number.parseInt(value, 10) || 0);
        state.bracket = null;
      }

      function rankGroup(groupName) {
        const ids = state.groups?.[groupName] || [];
        return ids
          .map((id, order) => ({
            player: getPlayer(id),
            stats: state.groupStats[id] || { wins: 0, remaining: 0 },
            order
          }))
          .filter((entry) => entry.player)
          .sort((a, b) => b.stats.wins - a.stats.wins || b.stats.remaining - a.stats.remaining || a.order - b.order);
      }

      function canEnterKnockout() {
        return Boolean(isPowerOfTwo(state.groupCount) && hasQualifiedGroups());
      }

      function enterKnockout() {
        if (!canEnterKnockout()) {
          setStatus(isPowerOfTwo(state.groupCount)
            ? "每组至少需要 2 名玩家才能进入淘汰赛"
            : "分组数量必须是 2 的幂次（2、4、8 或 16）才能进入淘汰赛");
          return;
        }
        if (!Array.isArray(state.bracket?.rounds)) {
          state.bracket = createKnockoutBracket();
          saveState();
        }
        window.location.assign("./knockout.html");
      }

      function hasQualifiedGroups() {
        const groupNames = getGroupNames();
        return Boolean(state.groups && groupNames.every((groupName) => (state.groups[groupName] || []).length >= 2));
      }

      function createKnockoutBracket() {
        const firstRoundMatches = [];
        const groupNames = getGroupNames();
        for (let index = 0; index < groupNames.length; index += 2) {
          const firstGroup = rankGroup(groupNames[index]);
          const secondGroup = rankGroup(groupNames[index + 1]);
          firstRoundMatches.push(
            { players: [firstGroup[0].player.id, secondGroup[1].player.id], winnerId: "" },
            { players: [secondGroup[0].player.id, firstGroup[1].player.id], winnerId: "" }
          );
        }

        const rounds = [];
        let matchCount = firstRoundMatches.length;
        let matches = firstRoundMatches;
        while (matchCount >= 1) {
          const roundNumber = rounds.length + 1;
          rounds.push({
            id: `R${roundNumber}`,
            label: knockoutRoundLabel(matchCount),
            matches: matches.map((match, index) => ({
              id: `R${roundNumber}M${index + 1}`,
              label: `${knockoutRoundLabel(matchCount)} ${index + 1}`,
              players: match.players || [],
              winnerId: match.winnerId || ""
            }))
          });
          if (matchCount === 1) {
            break;
          }
          matchCount /= 2;
          matches = Array.from({ length: matchCount }, () => ({ players: [], winnerId: "" }));
        }

        return {
          version: 2,
          groupCount: state.groupCount,
          rounds,
          third: { id: "T", label: "季军赛", players: [], winnerId: "" }
        };
      }

      function knockoutRoundLabel(matchCount) {
        if (matchCount === 1) {
          return "决赛";
        }
        if (matchCount === 2) {
          return "半决赛";
        }
        if (matchCount === 4) {
          return "四分之一决赛";
        }
        if (matchCount === 8) {
          return "八分之一决赛";
        }
        if (matchCount === 16) {
          return "十六分之一决赛";
        }
        return `第 ${matchCount} 轮`;
      }

      function createPetNoMap(list) {
        const map = new Map();
        sortedForLookup(list).forEach((pet) => {
          if (!map.has(pet.no)) {
            map.set(pet.no, pet);
          }
        });
        return map;
      }

      function createPetNameMap(list) {
        const map = new Map();
        sortedForLookup(list).forEach((pet) => {
          [pet.name, pet.displayName, pet.alt].filter(Boolean).forEach((name) => {
            if (!map.has(name)) {
              map.set(name, pet);
            }
          });
        });
        return map;
      }

      function sortedForLookup(list) {
        return [...list].sort((a, b) => petLookupRank(b) - petLookupRank(a));
      }

      function petLookupRank(pet) {
        let rank = 0;
        if (pet.form === "原始形态") {
          rank += 16;
        }
        if (pet.mainForm === "主形态") {
          rank += 8;
        }
        if (String(pet.finalState || "").includes("初始")) {
          rank += 4;
        }
        if (pet.stage === "一阶") {
          rank += 2;
        }
        if (pet.image) {
          rank += 1;
        }
        return rank;
      }

      function parseTeamInput(value) {
        const nos = String(value || "")
          .split(/[\s,，;；、]+/)
          .map((item) => item.trim())
          .filter(Boolean)
          .map(normalizeManualPetEntry);
        return { ok: true, nos };
      }

      function normalizeTeam(team) {
        if (!Array.isArray(team)) {
          return [];
        }
        return team
          .map(normalizeManualPetEntry)
          .filter(Boolean);
      }

      function normalizeManualPetEntry(value) {
        const text = String(value || "").trim();
        if (/^\d{1,3}$/.test(text)) {
          return text.padStart(3, "0");
        }
        return text;
      }

      function resolvePet(value) {
        const entry = normalizeManualPetEntry(value);
        if (!entry) {
          return null;
        }
        return petByNo.get(entry) || petByName.get(entry) || null;
      }

      function formatManualPetLabel(value) {
        const entry = normalizeManualPetEntry(value);
        return /^\d+$/.test(entry) ? `NO.${entry}` : entry;
      }

      function rollPetNos() {
        return shuffle(pets).slice(0, PET_COUNT).map((pet) => pet.no);
      }

      function createRoundRobinPairs(ids) {
        const pairs = [];
        for (let i = 0; i < ids.length; i += 1) {
          for (let j = i + 1; j < ids.length; j += 1) {
            pairs.push([ids[i], ids[j]]);
          }
        }
        return pairs;
      }

      function getPlayer(id) {
        return state.participants.find((participant) => participant.id === id);
      }

      function getEligibleParticipants() {
        return state.participants.filter((participant) => participant.eligible);
      }

      function shuffle(list) {
        const pool = [...list];
        for (let i = pool.length - 1; i > 0; i -= 1) {
          const j = randomInt(i + 1);
          [pool[i], pool[j]] = [pool[j], pool[i]];
        }
        return pool;
      }

      function randomInt(max) {
        if (window.crypto?.getRandomValues) {
          const range = 0x100000000;
          const limit = range - (range % max);
          const value = new Uint32Array(1);
          do {
            window.crypto.getRandomValues(value);
          } while (value[0] >= limit);
          return value[0] % max;
        }
        return Math.floor(Math.random() * max);
      }

      function createId() {
        if (window.crypto?.randomUUID) {
          return window.crypto.randomUUID();
        }
        return `${Date.now()}-${Math.random().toString(16).slice(2)}`;
      }

      function cleanName(value) {
        return String(value || "").replace(/\s+/g, " ").trim();
      }

      function normalizeGroupCount(value) {
        const count = Number.parseInt(value, 10);
        if (!Number.isFinite(count)) {
          return MIN_GROUP_COUNT;
        }
        return Math.min(MAX_GROUP_COUNT, Math.max(MIN_GROUP_COUNT, count));
      }

      function getGroupNames() {
        return Array.from({ length: state.groupCount }, (_, index) => String.fromCharCode(65 + index));
      }

      function isPowerOfTwo(value) {
        return Number.isInteger(value) && value >= MIN_GROUP_COUNT && (value & (value - 1)) === 0;
      }

      function migrateLegacyBracket(legacyBracket) {
        if (!Array.isArray(legacyBracket?.semis) || legacyBracket.semis.length !== 2) {
          return null;
        }
        const toMatch = (match, id, label) => ({
          id,
          label,
          players: Array.isArray(match?.players) ? match.players : [],
          winnerId: match?.winnerId || ""
        });
        return {
          version: 2,
          groupCount: 2,
          rounds: [
            {
              id: "R1",
              label: "半决赛",
              matches: legacyBracket.semis.map((match, index) => toMatch(match, `R1M${index + 1}`, `半决赛 ${index + 1}`))
            },
            {
              id: "R2",
              label: "决赛",
              matches: [toMatch(legacyBracket.final, "R2M1", "决赛 1")]
            }
          ],
          third: toMatch(legacyBracket.third, "T", "季军赛")
        };
      }

      function exportConfig() {
        const payload = {
          version: 1,
          exportedAt: new Date().toISOString(),
          state
        };
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "rocom-battle-config.json";
        link.click();
        URL.revokeObjectURL(url);
        setStatus("配置已导出");
      }

      function importConfig(event) {
        const [file] = event.target.files;
        event.target.value = "";
        if (!file) {
          return;
        }
        const reader = new FileReader();
        reader.addEventListener("load", () => {
          try {
            const parsed = JSON.parse(reader.result);
            const rawState = parsed?.state || parsed;
            if (!rawState || typeof rawState !== "object" || !Array.isArray(rawState.participants)) {
              throw new Error("无效配置");
            }
            const imported = createState(rawState);
            Object.assign(state, imported);
            normalizeState();
            saveState();
            renderAll();
            setStatus("配置已导入并保存到本地");
          } catch {
            setStatus("导入失败：请选择有效的配置文件");
          }
        });
        reader.addEventListener("error", () => setStatus("导入失败：无法读取配置文件"));
        reader.readAsText(file);
      }
    </script>
  </body>
</html>
