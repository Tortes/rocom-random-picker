<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>洛克淘汰赛</title>
    <style>
      :root {
        --page: #f3f7f7;
        --surface: #ffffff;
        --surface-alt: #f7fafc;
        --ink: #20323a;
        --muted: #687982;
        --line: #d5e1e3;
        --line-strong: #b4c8cb;
        --green: #23755f;
        --green-dark: #195c4b;
        --blue: #3f78b8;
        --gold: #b77916;
        --coral: #c65343;
        --shadow: 0 12px 28px rgba(32, 50, 58, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      html {
        background: var(--page);
        color: var(--ink);
        font-family: "Inter", "PingFang SC", "Microsoft YaHei", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      body {
        min-width: 320px;
        min-height: 100vh;
        margin: 0;
      }

      button,
      select {
        font: inherit;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .app-shell {
        width: min(1600px, calc(100% - 32px));
        margin: 0 auto;
        padding: 28px 0 42px;
      }

      .topbar {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 20px;
        padding: 4px 0 18px;
        border-bottom: 1px solid var(--line);
      }

      .eyebrow {
        margin: 0 0 8px;
        color: var(--green);
        font-size: 13px;
        font-weight: 800;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1 {
        font-size: 28px;
        line-height: 1.2;
      }

      h2 {
        font-size: 18px;
      }

      .link-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 40px;
        padding: 0 13px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.78);
        color: var(--muted);
        font-weight: 800;
      }

      .link-button:hover {
        border-color: var(--line-strong);
        color: var(--ink);
      }

      .status-strip {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin: 18px 0;
      }

      .tag {
        display: inline-flex;
        align-items: center;
        min-height: 30px;
        padding: 0 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.78);
        color: #43545c;
        font-size: 13px;
        font-weight: 800;
      }

      .save-state {
        color: var(--muted);
        font-size: 14px;
      }

      .podium {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        margin-bottom: 20px;
      }

      .podium-place {
        min-height: 84px;
        display: grid;
        align-content: center;
        gap: 5px;
        padding: 13px 15px;
        border: 1px solid var(--line);
        border-left: 4px solid var(--blue);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: 0 8px 20px rgba(32, 50, 58, 0.06);
      }

      .podium-place.champion {
        border-left-color: var(--gold);
      }

      .podium-place.third {
        border-left-color: var(--coral);
      }

      .podium-place span {
        color: var(--muted);
        font-size: 12px;
        font-weight: 900;
      }

      .podium-place strong {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 17px;
      }

      .bracket-section {
        padding: 20px 0 24px;
        border-top: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
      }

      .section-head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 14px;
        margin-bottom: 16px;
      }

      .section-help {
        color: var(--muted);
        font-size: 13px;
      }

      .bracket-scroll {
        overflow-x: auto;
        padding: 4px 2px 14px;
        -webkit-overflow-scrolling: touch;
      }

      .bracket-board {
        display: grid;
        gap: 38px;
        width: max-content;
        min-width: 100%;
      }

      .round-column {
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 12px;
        min-width: 250px;
      }

      .round-title {
        color: var(--muted);
        font-size: 13px;
        font-weight: 900;
        text-align: center;
      }

      .round-matches {
        display: grid;
        align-content: space-around;
        gap: 16px;
        min-height: 480px;
      }

      .bracket-match {
        position: relative;
        display: grid;
        gap: 9px;
        padding: 11px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .round-column:not(:first-child) .bracket-match::before {
        position: absolute;
        top: 50%;
        left: -39px;
        width: 38px;
        border-top: 1px solid var(--line-strong);
        content: "";
      }

      .match-name {
        color: var(--muted);
        font-size: 12px;
        font-weight: 900;
      }

      .match-players {
        display: grid;
        gap: 6px;
      }

      .match-player {
        display: flex;
        align-items: center;
        min-height: 36px;
        padding: 0 9px;
        border: 1px solid rgba(32, 50, 58, 0.08);
        border-radius: 7px;
        background: var(--surface-alt);
        font-size: 14px;
        font-weight: 800;
      }

      .match-player.winner {
        border-color: rgba(35, 117, 95, 0.42);
        background: rgba(35, 117, 95, 0.1);
        color: var(--green-dark);
      }

      .waiting-player {
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      .select-field {
        width: 100%;
        min-height: 36px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: #fff;
        color: var(--ink);
        padding: 0 9px;
        outline: none;
      }

      .select-field:focus {
        border-color: var(--green);
        box-shadow: 0 0 0 3px rgba(35, 117, 95, 0.12);
      }

      .third-place {
        display: grid;
        grid-template-columns: minmax(250px, 420px);
        justify-content: center;
        gap: 12px;
        margin-top: 22px;
      }

      .eliminated-section {
        padding-top: 24px;
      }

      .eliminated-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .eliminated-player {
        display: inline-flex;
        align-items: center;
        min-height: 34px;
        padding: 0 10px;
        border: 1px solid rgba(198, 83, 67, 0.26);
        border-radius: 8px;
        background: rgba(198, 83, 67, 0.07);
        color: #944135;
        font-size: 13px;
        font-weight: 800;
      }

      .empty-state {
        display: grid;
        place-items: center;
        min-height: 180px;
        padding: 24px;
        border: 1px dashed var(--line-strong);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.58);
        color: var(--muted);
        text-align: center;
      }

      @media (max-width: 760px) {
        .app-shell {
          width: min(100% - 20px, 680px);
          padding-top: 18px;
        }

        .topbar,
        .status-strip,
        .section-head {
          align-items: flex-start;
          flex-direction: column;
        }

        .link-button {
          width: 100%;
        }

        .podium {
          grid-template-columns: 1fr;
        }

        .round-matches {
          min-height: 420px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">洛克王国手游</p>
          <h1>淘汰赛</h1>
        </div>
        <a class="link-button" href="./tournament.html">返回小组赛</a>
      </header>

      <div class="status-strip">
        <span class="tag" id="bracketSummary">正在加载赛程</span>
        <span class="save-state" id="saveState"></span>
      </div>

      <section class="podium" aria-label="赛事排名" id="podium"></section>

      <section class="bracket-section" aria-label="淘汰赛赛程">
        <div class="section-head">
          <h2>晋级赛程</h2>
          <p class="section-help">选择每场胜者后，赛程将自动推进。</p>
        </div>
        <div class="bracket-scroll">
          <div class="bracket-board" id="bracketBoard"></div>
        </div>
        <div class="third-place" id="thirdPlace"></div>
      </section>

      <section class="eliminated-section" aria-label="已淘汰选手">
        <div class="section-head">
          <h2>已淘汰选手</h2>
          <p class="section-help" id="eliminatedSummary"></p>
        </div>
        <div class="eliminated-list" id="eliminatedList"></div>
      </section>
    </main>

    <script>
      const STORAGE_KEY = "rocom-battle-system-state";
      const state = loadState();

      const saveStateEl = document.querySelector("#saveState");
      const bracketSummary = document.querySelector("#bracketSummary");
      const podium = document.querySelector("#podium");
      const bracketBoard = document.querySelector("#bracketBoard");
      const thirdPlace = document.querySelector("#thirdPlace");
      const eliminatedList = document.querySelector("#eliminatedList");
      const eliminatedSummary = document.querySelector("#eliminatedSummary");

      init();

      function init() {
        normalizeState();
        if (!hasActiveBracket()) {
          renderUnavailableState();
          return;
        }
        syncBracket();
        saveState();
        renderAll();
      }

      function loadState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          return raw ? JSON.parse(raw) : { participants: [], groupCount: 2, bracket: null };
        } catch {
          return { participants: [], groupCount: 2, bracket: null };
        }
      }

      function normalizeState() {
        state.participants = Array.isArray(state.participants)
          ? state.participants
            .filter((participant) => participant && participant.id)
            .map((participant) => ({
              id: participant.id,
              name: cleanName(participant.name) || "未命名玩家",
              team: Array.isArray(participant.team) ? participant.team : [],
              eligible: Boolean(participant.eligible)
            }))
          : [];
        state.groupCount = normalizeGroupCount(state.groupCount);
        if (!isPowerOfTwo(state.groupCount) || !Array.isArray(state.bracket?.rounds)) {
          state.bracket = null;
        }
      }

      function hasActiveBracket() {
        const firstRoundPlayers = state.bracket?.rounds?.[0]?.matches?.flatMap((match) => match.players) || [];
        return Boolean(
          state.bracket
          && state.bracket.groupCount === state.groupCount
          && state.bracket.rounds.length >= 2
          && firstRoundPlayers.length === state.groupCount * 2
          && new Set(firstRoundPlayers).size === firstRoundPlayers.length
          && firstRoundPlayers.every((id) => getPlayer(id)?.eligible)
        );
      }

      function syncBracket() {
        const rounds = state.bracket.rounds;
        rounds.forEach((round) => {
          round.matches = Array.isArray(round.matches) ? round.matches : [];
          round.matches.forEach(normalizeMatch);
        });

        for (let roundIndex = 1; roundIndex < rounds.length; roundIndex += 1) {
          const previousMatches = rounds[roundIndex - 1].matches;
          rounds[roundIndex].matches.forEach((match, matchIndex) => {
            const sources = previousMatches.slice(matchIndex * 2, matchIndex * 2 + 2);
            match.players = sources.length === 2 && sources.every((source) => source.winnerId)
              ? sources.map((source) => source.winnerId)
              : [];
            normalizeMatch(match);
          });
        }

        const semifinalMatches = rounds.at(-2).matches;
        state.bracket.third = state.bracket.third || { id: "T", label: "季军赛", players: [], winnerId: "" };
        state.bracket.third.players = semifinalMatches.length === 2 && semifinalMatches.every((match) => match.winnerId)
          ? semifinalMatches.map((match) => match.players.find((id) => id !== match.winnerId)).filter(Boolean)
          : [];
        normalizeMatch(state.bracket.third);
      }

      function normalizeMatch(match) {
        match.players = Array.isArray(match.players)
          ? match.players.filter((id) => getPlayer(id)?.eligible)
          : [];
        if (!match.players.includes(match.winnerId)) {
          match.winnerId = "";
        }
      }

      function renderAll() {
        const entrantCount = state.bracket.rounds[0].matches.length * 2;
        bracketSummary.textContent = `${state.groupCount} 组晋级，${entrantCount} 名选手进入淘汰赛`;
        setStatus("赛程已保存到本地");
        renderPodium();
        renderBracket();
        renderThirdPlace();
        renderEliminatedPlayers();
      }

      function renderPodium() {
        const finalMatch = state.bracket.rounds.at(-1).matches[0];
        const championId = finalMatch.winnerId;
        const runnerUpId = championId ? getLoser(finalMatch) : "";
        const thirdId = state.bracket.third.winnerId;
        const places = [
          ["冠军", championId, "champion"],
          ["亚军", runnerUpId, "runner-up"],
          ["季军", thirdId, "third"]
        ];
        podium.replaceChildren(...places.map(([label, id, className]) => {
          const place = document.createElement("article");
          place.className = `podium-place ${className}`;
          const title = document.createElement("span");
          title.textContent = label;
          const value = document.createElement("strong");
          value.textContent = getPlayer(id)?.name || "未决出";
          place.append(title, value);
          return place;
        }));
      }

      function renderBracket() {
        bracketBoard.style.gridTemplateColumns = `repeat(${state.bracket.rounds.length}, minmax(250px, 270px))`;
        bracketBoard.replaceChildren(...state.bracket.rounds.map(renderRound));
      }

      function renderRound(round) {
        const column = document.createElement("section");
        column.className = "round-column";
        const title = document.createElement("h2");
        title.className = "round-title";
        title.textContent = round.label;
        const matches = document.createElement("div");
        matches.className = "round-matches";
        matches.append(...round.matches.map(renderMatch));
        column.append(title, matches);
        return column;
      }

      function renderMatch(match) {
        const card = document.createElement("article");
        card.className = "bracket-match";
        const title = document.createElement("div");
        title.className = "match-name";
        title.textContent = match.label;
        const players = document.createElement("div");
        players.className = "match-players";
        if (match.players.length === 2) {
          match.players.forEach((id) => {
            const player = document.createElement("div");
            player.className = id === match.winnerId ? "match-player winner" : "match-player";
            player.textContent = getPlayer(id)?.name || "未知玩家";
            players.append(player);
          });
        } else {
          const waiting = document.createElement("div");
          waiting.className = "waiting-player";
          waiting.textContent = "等待上一轮结果";
          players.append(waiting);
        }
        const select = document.createElement("select");
        select.className = "select-field";
        select.disabled = match.players.length !== 2;
        appendOption(select, "", "选择胜者");
        match.players.forEach((id) => appendOption(select, id, getPlayer(id)?.name || "未知玩家"));
        select.value = match.winnerId;
        select.addEventListener("change", () => {
          match.winnerId = select.value;
          syncBracket();
          saveState();
          renderAll();
        });
        card.append(title, players, select);
        return card;
      }

      function renderThirdPlace() {
        thirdPlace.replaceChildren(renderMatch(state.bracket.third));
      }

      function renderEliminatedPlayers() {
        const eliminated = getEliminatedPlayerIds();
        eliminatedSummary.textContent = eliminated.length ? `共 ${eliminated.length} 人` : "暂未产生";
        if (!eliminated.length) {
          const empty = document.createElement("span");
          empty.className = "section-help";
          empty.textContent = "比赛结束后将自动列出未进入前三的选手。";
          eliminatedList.replaceChildren(empty);
          return;
        }
        eliminatedList.replaceChildren(...eliminated.map((id) => {
          const player = document.createElement("span");
          player.className = "eliminated-player";
          player.textContent = getPlayer(id)?.name || "未知玩家";
          return player;
        }));
      }

      function getEliminatedPlayerIds() {
        const allMatches = [...state.bracket.rounds.flatMap((round) => round.matches), state.bracket.third];
        const completedLosers = new Set(allMatches.map(getLoser).filter(Boolean));
        const activePlayers = new Set(allMatches
          .filter((match) => !match.winnerId)
          .flatMap((match) => match.players));
        const finalMatch = state.bracket.rounds.at(-1).matches[0];
        const podiumPlayers = new Set([
          finalMatch.winnerId,
          finalMatch.winnerId ? getLoser(finalMatch) : "",
          state.bracket.third.winnerId
        ].filter(Boolean));
        return [...completedLosers].filter((id) => !activePlayers.has(id) && !podiumPlayers.has(id));
      }

      function getLoser(match) {
        return match.winnerId ? match.players.find((id) => id !== match.winnerId) || "" : "";
      }

      function appendOption(select, value, label) {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = label;
        select.append(option);
      }

      function getPlayer(id) {
        return state.participants.find((participant) => participant.id === id);
      }

      function normalizeGroupCount(value) {
        const count = Number.parseInt(value, 10);
        return Number.isFinite(count) ? Math.min(26, Math.max(2, count)) : 2;
      }

      function isPowerOfTwo(value) {
        return Number.isInteger(value) && value >= 2 && (value & (value - 1)) === 0;
      }

      function cleanName(value) {
        return String(value || "").replace(/\s+/g, " ").trim();
      }

      function saveState() {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        } catch {
          setStatus("本地保存不可用");
        }
      }

      function setStatus(message) {
        saveStateEl.textContent = message;
      }

      function renderUnavailableState() {
        bracketSummary.textContent = "尚未创建淘汰赛";
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.textContent = "请返回小组赛，完成资格验证、分组和积分录入后进入淘汰赛。";
        bracketBoard.replaceChildren(empty);
        podium.replaceChildren();
        thirdPlace.replaceChildren();
        eliminatedList.replaceChildren();
        eliminatedSummary.textContent = "";
      }
    </script>
  </body>
</html>
