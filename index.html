<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>洛克王国手游随机 6 只精灵</title>
    <style>
      :root {
        --page: #f4f7f5;
        --page-alt: #eef3f7;
        --panel: #ffffff;
        --ink: #223039;
        --muted: #6a7881;
        --line: #d8e2e3;
        --line-strong: #b9cacc;
        --green: #2d7a68;
        --coral: #c95642;
        --gold: #e3ad35;
        --blue: #4a80c2;
        --shadow: 0 12px 30px rgba(34, 48, 57, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
        background: var(--page);
        color: var(--ink);
        font-family: "Inter", "PingFang SC", "Microsoft YaHei", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background: linear-gradient(180deg, var(--page) 0%, var(--page-alt) 48%, #f7f1eb 100%);
      }

      button,
      a {
        font: inherit;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .app-shell {
        width: min(1280px, calc(100% - 32px));
        margin: 0 auto;
        padding: 28px 0 36px;
      }

      .topbar {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 20px;
        padding: 6px 0 18px;
        border-bottom: 1px solid var(--line);
      }

      .eyebrow {
        margin: 0 0 8px;
        color: var(--green);
        font-size: 13px;
        font-weight: 800;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.18;
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .source-link,
      .history-button,
      .clear-history,
      .draw-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        min-height: 42px;
        border-radius: 8px;
        padding: 0 14px;
        white-space: nowrap;
      }

      .source-link,
      .history-button,
      .clear-history {
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.7);
        color: var(--muted);
        font-size: 14px;
        cursor: pointer;
      }

      .source-link:hover,
      .history-button:hover,
      .clear-history:hover {
        border-color: var(--line-strong);
        color: var(--ink);
      }

      .clear-history {
        min-height: 34px;
        padding: 0 11px;
      }

      .clear-history:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .draw-button {
        border: 1px solid #1f6a59;
        background: #267865;
        color: #fff;
        font-weight: 800;
        cursor: pointer;
        box-shadow: 0 10px 18px rgba(38, 120, 101, 0.22);
      }

      .draw-button:hover {
        background: #1f6a59;
      }

      .draw-button:disabled {
        border-color: var(--line);
        background: #a8b6b8;
        box-shadow: none;
        cursor: wait;
      }

      .draw-button svg,
      .source-link svg,
      .history-button svg,
      .clear-history svg {
        width: 18px;
        height: 18px;
        flex: 0 0 auto;
      }

      .scope-strip {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        margin: 18px 0 16px;
      }

      .scope-tags {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .tag {
        display: inline-flex;
        align-items: center;
        min-height: 30px;
        padding: 0 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.7);
        color: #43515a;
        font-size: 13px;
        font-weight: 700;
      }

      .status {
        color: var(--muted);
        font-size: 14px;
        white-space: nowrap;
      }

      .meter-row {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        margin-bottom: 18px;
      }

      .meter {
        min-height: 72px;
        padding: 14px 16px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.76);
      }

      .meter span {
        display: block;
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      .meter strong {
        display: block;
        margin-top: 4px;
        color: var(--ink);
        font-size: 25px;
        line-height: 1.1;
      }

      .meter:nth-child(2) strong {
        color: var(--coral);
      }

      .meter:nth-child(3) strong {
        color: var(--blue);
      }

      .roster {
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        gap: 14px;
        align-items: stretch;
      }

      .empty-state {
        grid-column: 1 / -1;
        min-height: 340px;
        display: grid;
        place-items: center;
        border: 1px dashed var(--line-strong);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.55);
        color: var(--muted);
        text-align: center;
        padding: 24px;
      }

      .history-section {
        margin-top: 18px;
        padding-top: 18px;
        border-top: 1px solid var(--line);
      }

      .history-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      .history-title {
        display: flex;
        align-items: baseline;
        gap: 10px;
      }

      .history-title h2 {
        margin: 0;
        font-size: 18px;
        line-height: 1.2;
      }

      .history-count {
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      .history-list {
        display: grid;
        gap: 10px;
      }

      .history-item {
        display: grid;
        gap: 10px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.78);
      }

      .history-meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
      }

      .history-pets {
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        gap: 8px;
      }

      .history-pet {
        min-height: 58px;
        display: grid;
        grid-template-columns: 38px minmax(0, 1fr);
        align-items: center;
        gap: 8px;
        padding: 7px;
        border: 1px solid rgba(34, 48, 57, 0.08);
        border-radius: 8px;
        background: #fff;
      }

      .history-pet img {
        width: 38px;
        height: 38px;
        object-fit: contain;
        filter: drop-shadow(0 3px 4px rgba(34, 48, 57, 0.12));
      }

      .history-pet strong,
      .history-pet span {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .history-pet strong {
        color: var(--ink);
        font-size: 13px;
      }

      .history-pet span {
        margin-top: 2px;
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
      }

      .history-empty {
        min-height: 96px;
        display: grid;
        place-items: center;
        border: 1px dashed var(--line-strong);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.55);
        color: var(--muted);
        font-size: 14px;
      }

      .pet-card {
        position: relative;
        min-height: 318px;
        display: grid;
        grid-template-rows: auto 178px auto auto;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: var(--shadow);
      }

      .pet-card::before {
        content: "";
        position: absolute;
        inset: 0 0 auto;
        height: 5px;
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
      }

      .pet-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        min-height: 42px;
        padding: 13px 13px 5px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
      }

      .slot {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 28px;
        height: 24px;
        border-radius: 6px;
        background: rgba(34, 48, 57, 0.06);
        color: var(--ink);
      }

      .number {
        white-space: nowrap;
      }

      .pet-art {
        position: relative;
        display: grid;
        place-items: center;
        margin: 0 12px;
        border-radius: 8px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.95), rgba(245, 248, 247, 0.92)),
          radial-gradient(circle at 50% 76%, var(--accent) 0%, rgba(255, 255, 255, 0) 44%);
        overflow: hidden;
      }

      .pet-art::after {
        content: "";
        position: absolute;
        left: 23%;
        right: 23%;
        bottom: 23px;
        height: 16px;
        border-radius: 50%;
        background: rgba(34, 48, 57, 0.12);
        filter: blur(5px);
      }

      .pet-art img {
        position: relative;
        z-index: 1;
        max-width: 166px;
        max-height: 166px;
        width: auto;
        height: auto;
        object-fit: contain;
        filter: drop-shadow(0 8px 9px rgba(34, 48, 57, 0.18));
      }

      .pet-body {
        display: grid;
        gap: 7px;
        padding: 12px 13px 6px;
      }

      .pet-name {
        min-height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--ink);
        font-size: 18px;
        font-weight: 900;
        line-height: 1.22;
        text-align: center;
      }

      .pet-name:hover {
        color: #1f6a59;
      }

      .types {
        display: flex;
        min-height: 30px;
        align-items: center;
        justify-content: center;
        gap: 6px;
        flex-wrap: wrap;
      }

      .type-chip {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 34px;
        min-height: 24px;
        padding: 2px 8px;
        border-radius: 7px;
        background: var(--type-color);
        color: #fff;
        font-size: 12px;
        font-weight: 800;
      }

      .pet-foot {
        min-height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 13px 13px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }

      .pet-card.is-entering {
        animation: pop-in 220ms ease-out both;
      }

      @keyframes pop-in {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 1180px) {
        .roster {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }

      @media (max-width: 760px) {
        .app-shell {
          width: min(100% - 20px, 680px);
          padding-top: 18px;
        }

        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .actions,
        .draw-button,
        .source-link,
        .history-button {
          width: 100%;
        }

        .scope-strip {
          align-items: flex-start;
          flex-direction: column;
        }

        .status {
          white-space: normal;
        }

        .meter-row {
          grid-template-columns: 1fr;
        }

        .roster {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 10px;
        }

        .history-head {
          align-items: flex-start;
          flex-direction: column;
        }

        .clear-history {
          width: 100%;
        }

        .history-pets {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .pet-card {
          min-height: 270px;
          grid-template-rows: auto 136px auto auto;
          box-shadow: 0 8px 18px rgba(34, 48, 57, 0.08);
        }

        .pet-head {
          padding: 12px 10px 4px;
        }

        .pet-art {
          margin: 0 9px;
        }

        .pet-art img {
          max-width: 128px;
          max-height: 128px;
        }

        .pet-name {
          min-height: 38px;
          font-size: 15px;
        }

        .pet-body {
          padding: 10px 9px 5px;
        }

        .pet-foot {
          padding: 0 9px 10px;
        }
      }

      @media (max-width: 420px) {
        h1 {
          font-size: 24px;
        }

        .roster {
          grid-template-columns: 1fr;
        }

        .history-pets {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">洛克王国手游</p>
          <h1>随机 6 只精灵</h1>
        </div>
        <div class="actions">
          <a class="source-link" href="https://wiki.biligame.com/rocom/%E7%B2%BE%E7%81%B5%E5%9B%BE%E9%89%B4" target="_blank" rel="noreferrer">
            <svg aria-hidden="true" viewBox="0 0 24 24" fill="none">

            </svg>
            BWiki 图鉴
          </a>
          <button class="history-button" id="historyButton" type="button" aria-expanded="false" aria-controls="historySection">
            <svg aria-hidden="true" viewBox="0 0 24 24" fill="none">

              <path d="M3 4v5h5M12 7v5l3 2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
            历史记录
          </button>
          <button class="draw-button" id="drawButton" type="button" disabled title="抽选随机 6 只精灵">
            <svg aria-hidden="true" viewBox="0 0 24 24" fill="none">
              <rect x="4" y="4" width="16" height="16" rx="3" stroke="currentColor" stroke-width="2"></rect>
              <circle cx="9" cy="9" r="1.5" fill="currentColor"></circle>
              <circle cx="15" cy="9" r="1.5" fill="currentColor"></circle>
              <circle cx="9" cy="15" r="1.5" fill="currentColor"></circle>
              <circle cx="15" cy="15" r="1.5" fill="currentColor"></circle>
            </svg>
            抽选 6 只
          </button>
        </div>
      </header>

      <section class="scope-strip" aria-label="候选范围">
        <div class="scope-tags">
          <span class="tag">一阶</span>
          <span class="tag">主形态</span>
          <span class="tag">非首领</span>
          <span class="tag">非传说</span>
          <span class="tag">无地区形态</span>
        </div>
        <div class="status" id="statusText">正在加载图鉴数据</div>
      </section>

      <section class="meter-row" aria-label="抽选统计">
        <div class="meter">
          <span>候选池</span>
          <strong id="poolCount">--</strong>
        </div>
        <div class="meter">
          <span>本轮序号</span>
          <strong id="roundCount">--</strong>
        </div>
        <div class="meter">
          <span>本轮数量</span>
          <strong>6</strong>
        </div>
      </section>

      <section class="roster" id="roster" aria-live="polite">
        <div class="empty-state">加载中</div>
      </section>

      <section class="history-section" id="historySection" aria-label="历史抽选" hidden>
        <div class="history-head">
          <div class="history-title">
            <h2>历史抽选</h2>
            <span class="history-count" id="historyCount">0 轮</span>
          </div>
          <button class="clear-history" id="clearHistoryButton" type="button">
            <svg aria-hidden="true" viewBox="0 0 24 24" fill="none">
              <path d="M3 6h18M8 6V4h8v2M6 6l1 15h10l1-15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
              <path d="M10 11v5M14 11v5" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
            </svg>
            清空历史
          </button>
        </div>
        <div class="history-list" id="historyList"></div>
      </section>
    </main>

      const state = {
        pets: [],
        round: 0,
        loading: true,
        history: loadHistory()
      };

      const roster = document.querySelector("#roster");
      const drawButton = document.querySelector("#drawButton");
      const historyButton = document.querySelector("#historyButton");
      const historySection = document.querySelector("#historySection");
      const historyList = document.querySelector("#historyList");
      const historyCount = document.querySelector("#historyCount");
      const clearHistoryButton = document.querySelector("#clearHistoryButton");
      const statusText = document.querySelector("#statusText");
      const poolCount = document.querySelector("#poolCount");
      const roundCount = document.querySelector("#roundCount");

      drawButton.addEventListener("click", () => {
        if (state.loading) {
          return;
        }
        if (state.pets.length < DRAW_SIZE) {
          loadPets();
          return;
        }
        drawTeam();
      });

      historyButton.addEventListener("click", () => {
        historySection.hidden = !historySection.hidden;
        updateHistoryButton();
        if (!historySection.hidden) {
          historySection.scrollIntoView({ behavior: "smooth", block: "start" });
        }
      });

      clearHistoryButton.addEventListener("click", () => {
        state.history = [];
        saveHistory();
        renderHistory();
      });

      renderHistory();
      loadPets();

      async function loadPets() {
        setLoading(true);
        try {
          const response = await fetch(API_URL, { cache: "no-store" });
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }
          const payload = await response.json();
          const html = payload?.parse?.text?.["*"];
          if (!html) {
            throw new Error("BWiki API 返回为空");
          }
          const pets = extractPets(html);
          if (pets.length < DRAW_SIZE) {
            throw new Error(`候选池不足 ${DRAW_SIZE} 只`);
          }
          state.pets = pets;
          poolCount.textContent = String(pets.length);
          statusText.textContent = "数据来自 BWiki 精灵图鉴";
          drawButton.disabled = false;
          drawButton.innerHTML = drawButtonMarkup("抽选 6 只");
          setLoading(false);
          drawTeam();
        } catch (error) {
          if (FALLBACK_PETS.length >= DRAW_SIZE) {
            state.pets = FALLBACK_PETS;
            poolCount.textContent = String(FALLBACK_PETS.length);
            statusText.textContent = `使用内置候选池，实时数据暂不可用：${error.message}`;
            drawButton.disabled = false;
            drawButton.innerHTML = drawButtonMarkup("抽选 6 只");
            setLoading(false);
            drawTeam();
            return;
          }
          state.pets = [];
          poolCount.textContent = "--";
          roundCount.textContent = "--";
          setLoading(false);
          drawButton.disabled = false;
          drawButton.innerHTML = drawButtonMarkup("重新加载");
          statusText.textContent = `加载失败：${error.message}`;
          renderEmpty("图鉴数据加载失败");
        }
      }

      function setLoading(value) {
        state.loading = value;
        drawButton.disabled = value;
        if (value) {
          statusText.textContent = "正在加载图鉴数据";
          renderEmpty("加载中");
        }
      }

      function extractPets(html) {
        const doc = new DOMParser().parseFromString(html, "text/html");
        return [...doc.querySelectorAll(".dex-pet-card")]
          .map(readPetCard)
          .filter(Boolean);
      }

      function readPetCard(card) {
        const stage = card.getAttribute("data-param1") || "";
        const form = card.getAttribute("data-param4") || "";
        const mainForm = card.getAttribute("data-param5") || "";
        if (stage !== "一阶" || form !== "原始形态" || mainForm !== "主形态") {
          return null;
        }

        const nameLink = card.querySelector(".dex-card-name a");
        const titleName = cleanText(nameLink?.getAttribute("title"));
        const displayName = cleanText(nameLink?.textContent) || titleName;
        if (!titleName || LEGENDARY_NAME_EXCLUDES.has(titleName) || LEGENDARY_NAME_EXCLUDES.has(displayName)) {
          return null;
        }

        const image = card.querySelector(".dex-pet-art-normal img") || card.querySelector(".dex-pet-art img");
        const src = normalizeUrl(image?.getAttribute("src"));
        if (!src) {
          return null;
        }

        const noText = cleanText(card.querySelector(".dex-card-kicker")?.textContent);
        const no = noText.match(/NO\.(\d+)/)?.[1] || "???";
        if (LEGENDARY_NO_EXCLUDES.has(no)) {
          return null;
        }
        const types = [...card.querySelectorAll(".dex-type span")]
          .map((node) => cleanText(node.textContent))
          .filter(Boolean);
        const styleText = card.getAttribute("style") || "";
        const accent = styleText.match(/--dex-accent:([^;]+)/)?.[1]?.trim() || TYPE_COLORS[types[0]] || "#2d7a68";
        const accent2 = styleText.match(/--dex-accent-2:([^;]+)/)?.[1]?.trim() || TYPE_COLORS[types[1]] || accent;
        const href = normalizeUrl(nameLink?.getAttribute("href"));

        return {
          no,
          name: titleName,
          displayName,
          types,
          image: src,
          image2x: retinaThumb(src),
          alt: cleanText(image?.getAttribute("alt")) || titleName,
          link: href,
          accent,
          accent2
        };
      }

      function drawTeam() {
        const picks = sampleUnique(state.pets, DRAW_SIZE);
        state.round += 1;
        roundCount.textContent = String(state.round).padStart(2, "0");
        recordDraw(picks);
        roster.replaceChildren(...picks.map(renderPet));
        requestAnimationFrame(() => {
          roster.querySelectorAll(".pet-card").forEach((card, index) => {
            card.style.animationDelay = `${index * 26}ms`;
            card.classList.add("is-entering");
          });
        });
      }

      function recordDraw(picks) {
        const entry = {
          id: `${Date.now()}-${state.round}`,
          round: state.round,
          time: new Date().toISOString(),
          pets: picks.map(compactPet)
        };
        state.history = [entry, ...state.history].slice(0, HISTORY_LIMIT);
        saveHistory();
        renderHistory();
      }

      function renderHistory() {
        historyCount.textContent = `${state.history.length} 轮`;
        clearHistoryButton.disabled = state.history.length === 0;
        historyList.replaceChildren(...(state.history.length ? state.history.map(renderHistoryItem) : [renderHistoryEmpty()]));
        updateHistoryButton();
      }

      function renderHistoryItem(entry) {
        const item = document.createElement("article");
        item.className = "history-item";

        const meta = document.createElement("div");
        meta.className = "history-meta";
        const round = document.createElement("span");
        round.textContent = `第 ${String(entry.round).padStart(2, "0")} 轮`;
        const time = document.createElement("span");
        time.textContent = formatHistoryTime(entry.time);
        meta.append(round, time);

        const pets = document.createElement("div");
        pets.className = "history-pets";
        entry.pets.forEach((pet) => pets.append(renderHistoryPet(pet)));

        item.append(meta, pets);
        return item;
      }

      function renderHistoryPet(pet) {
        const link = document.createElement("a");
        link.className = "history-pet";
        link.href = pet.link;
        link.target = "_blank";
        link.rel = "noreferrer";
        link.title = pet.displayName;

        const img = document.createElement("img");
        img.src = pet.image;
        img.alt = pet.displayName;
        img.loading = "lazy";
        img.decoding = "async";

        const body = document.createElement("div");
        const name = document.createElement("strong");
        name.textContent = pet.displayName;
        const number = document.createElement("span");
        number.textContent = `NO.${pet.no}`;
        body.append(name, number);

        link.append(img, body);
        return link;
      }

      function renderHistoryEmpty() {
        const empty = document.createElement("div");
        empty.className = "history-empty";
        empty.textContent = "暂无历史";
        return empty;
      }

      function renderPet(pet, index) {
        const card = document.createElement("article");
        card.className = "pet-card";
        card.style.setProperty("--accent", pet.accent);
        card.style.setProperty("--accent-2", pet.accent2);

        const head = document.createElement("div");
        head.className = "pet-head";
        head.innerHTML = `<span class="slot">${index + 1}</span><span class="number">NO.${pet.no}</span>`;

        const artLink = document.createElement("a");
        artLink.className = "pet-art";
        artLink.href = pet.link;
        artLink.target = "_blank";
        artLink.rel = "noreferrer";
        artLink.title = pet.name;

        const img = document.createElement("img");
        img.src = pet.image;
        img.srcset = `${pet.image} 1x, ${pet.image2x} 2x`;
        img.alt = pet.displayName;
        img.loading = "eager";
        img.decoding = "async";
        artLink.append(img);

        const body = document.createElement("div");
        body.className = "pet-body";

        const name = document.createElement("a");
        name.className = "pet-name";
        name.href = pet.link;
        name.target = "_blank";
        name.rel = "noreferrer";
        name.textContent = pet.displayName;

        const types = document.createElement("div");
        types.className = "types";
        pet.types.forEach((type) => {
          const chip = document.createElement("span");
          chip.className = "type-chip";
          chip.style.setProperty("--type-color", TYPE_COLORS[type] || pet.accent);
          chip.textContent = type;
          types.append(chip);
        });

        body.append(name, types);

        const foot = document.createElement("div");
        foot.className = "pet-foot";
        foot.textContent = "一阶主形态";

        card.append(head, artLink, body, foot);
        return card;
      }

      function renderEmpty(text) {
        const box = document.createElement("div");
        box.className = "empty-state";
        box.textContent = text;
        roster.replaceChildren(box);
      }

      function sampleUnique(list, size) {
        const pool = [...list];
        for (let i = pool.length - 1; i > 0; i -= 1) {
          const j = randomInt(i + 1);
          [pool[i], pool[j]] = [pool[j], pool[i]];
        }
        return pool.slice(0, size);
      }

      function randomInt(max) {
        if (window.crypto?.getRandomValues) {
          const range = 0x100000000;
          const limit = range - (range % max);
          const value = new Uint32Array(1);
          do {
            window.crypto.getRandomValues(value);
          } while (value[0] >= limit);
          return value[0] % max;
        }
        return Math.floor(Math.random() * max);
      }

      function cleanText(value) {
        return String(value || "").replace(/\s+/g, " ").trim();
      }

      function normalizeUrl(url) {
        if (!url) {
          return "";
        }
        if (url.startsWith("//")) {
          return `https:${url}`;
        }
        return new URL(url, SOURCE_ORIGIN).href;
      }

      function retinaThumb(url) {
        return url.replace(/\/180px-/, "/360px-");
      }

      function compactPet(pet) {
        return {
          no: pet.no,
          displayName: pet.displayName,
          image: pet.image,
          link: pet.link
        };
      }

      function loadHistory() {
        try {
          const raw = localStorage.getItem(HISTORY_STORAGE_KEY);
          if (!raw) {
            return [];
          }
          const parsed = JSON.parse(raw);
          if (!Array.isArray(parsed)) {
            return [];
          }
          return parsed
            .filter((entry) => entry && Array.isArray(entry.pets))
            .slice(0, HISTORY_LIMIT);
        } catch {
          return [];
        }
      }

      function saveHistory() {
        try {
          localStorage.setItem(HISTORY_STORAGE_KEY, JSON.stringify(state.history));
        } catch {
          // History is optional; drawing should keep working if storage is unavailable.
        }
      }

      function updateHistoryButton() {
        historyButton.setAttribute("aria-expanded", String(!historySection.hidden));
      }

      function formatHistoryTime(value) {
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) {
          return "";
        }
        return date.toLocaleString("zh-CN", {
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          hour12: false
        });
      }

      function drawButtonMarkup(label) {
        return `
          <svg aria-hidden="true" viewBox="0 0 24 24" fill="none">
            <rect x="4" y="4" width="16" height="16" rx="3" stroke="currentColor" stroke-width="2"></rect>
            <circle cx="9" cy="9" r="1.5" fill="currentColor"></circle>
            <circle cx="15" cy="9" r="1.5" fill="currentColor"></circle>
            <circle cx="9" cy="15" r="1.5" fill="currentColor"></circle>
            <circle cx="15" cy="15" r="1.5" fill="currentColor"></circle>
          </svg>
          ${label}
        `;
      }
    </script>
  </body>
</html>
